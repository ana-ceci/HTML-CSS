<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="post" autocomplete="on">




        <p>
            <label for="iest">Estado:</label>
            <select name="estado" id="iest">

                <optgroup label="Região Sueste">
                    <option value="sp">São Paulo</option>
                    <option value="rj">Rio de Janeiro</option>
                    <option value="mg">Minas Gerais</option>
                    <option value="es">Espírito Santo</option>
                </optgroup>

                <optgroup label="Região Nordeste">
                    <option value="RN">Rio Grande do Norte</option>
                    <option value="PB">Paraíba</option>
                    <option value="PE">Pernambuco</option>
                </optgroup>
            </select>
        </p>

        <p>
            <label for="iprof">Profissão:</label>
            <input type="text" name="prof" id="iprof"  list="lstprof">
                <datalist id="lstprof">
                    <option value="dev">Desenvolvedor</option>
                    <option value="des">Designer</option>
                    <option value="arq">Arquiteto</option>
                    <option value="eng">Engenheiro</option>
                </datalist>
        </p>



<p>
    <label for="imsg">Mensagem:</label>
    <textarea name="msg" id="imsg" cols="30" rows="5"> Sua mensagem...</textarea>
</p>

















        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
</body>

</html>
